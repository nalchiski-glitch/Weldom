name: Build EXE

on:
 push:
   branches: [ "main" ]
 workflow_dispatch:

jobs:
 build:
   runs-on: windows-latest

   steps:
   - name: Checkout code
     uses: actions/checkout@v4

   - name: Configure CMake
# Создаем файлы сборки для Visual Studio 2022
     run: cmake -B build -G "Visual Studio 17 2022" -A x64

   - name: Build
# Запускаем компиляцию в режиме Release
     run: cmake --build build --config Release

   - name: Upload EXE
     uses: actions/upload-artifact@v4
     with:
       name: Weldom_Prototype_Build
# Сохраняем только .exe и .dll (если есть).
# Это исключает промежуточные файлы сборки (.obj, .log, .tlog)
       path: |
         build/Release/*.exe
         build/Release/*.dll
       if-no-files-found: error
