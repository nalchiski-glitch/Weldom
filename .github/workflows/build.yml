name: Build Weldom_Prototype

on:
 push:
   branches: [ main ]
 pull_request:
   branches: [ main ]

jobs:
 build:
   runs-on: windows-latest

   steps:
   - name: Checkout code
     uses: actions/checkout@v4

   - name: Setup CMake
     uses: lukka/get-cmake@latest

   - name: Configure CMake
     run: cmake -B build -G "Visual Studio 17 2022" -A x64

   - name: Build
     run: cmake --build build --config Release

   - name: Upload EXE
     uses: actions/upload-artifact@v4
     with:
       name: Weldom_Prototype_Build
       path: |
         build/Release/*.exe
         build/Release/*.dll
