
name: Build SFML Game

on:
 push:
   branches: [ "main" ]
 workflow_dispatch:

jobs:
 build:
   runs-on: windows-latest
   steps:
     - name: Checkout code
       uses: actions/checkout@v4

     - name: Download SFML
       shell: pwsh
       run: |
         Invoke-WebRequest -Uri "https://www.sfml-dev.org/files/SFML-2.6.1-windows-vc17-64-bit.zip" -OutFile "sfml.zip"
         Expand-Archive -Path sfml.zip -DestinationPath C:\SFML

     - name: Configure CMake
       run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DSFML_DIR=C:\SFML\SFML-2.6.1\lib\cmake\SFML

     - name: Build
       run: cmake --build build --config Release

     - name: Package
       shell: pwsh
       run: |
         New-Item -ItemType Directory -Path package -Force
         Copy-Item build\Release\*.exe package\
         Copy-Item build\Release\*.dll package\
         Copy-Item *.png package\
         Copy-Item C:\SFML\SFML-2.6.1\bin\*.dll package\

     - name: Upload
       uses: actions/upload-artifact@v4
       with:
         name: Weldom
         path: package\
